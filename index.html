    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f4f7fc;
            overflow-x: hidden;
        }

        /* ======================= ANIMASI KUSTOM ======================= */
        
        /* Animasi Fade In Up */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Animasi Fade In Left */
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Animasi Fade In Right */
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Animasi Zoom In */
        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* Animasi Pulse (Berdenyut) */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        
        /* Animasi Shine (Kilauan) */
        @keyframes shine {
            0% {
                background-position: -100%;
            }
            100% {
                background-position: 200%;
            }
        }
        
        /* Animasi Float (Mengambang) */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        
        /* Animasi Rotate (Berputar) */
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        /* Class untuk animasi */
        .animate-fadeInUp {
            animation: fadeInUp 0.8s ease forwards;
        }
        
        .animate-fadeInLeft {
            animation: fadeInLeft 0.8s ease forwards;
        }
        
        .animate-fadeInRight {
            animation: fadeInRight 0.8s ease forwards;
        }
        
        .animate-zoomIn {
            animation: zoomIn 0.6s ease forwards;
        }
        
        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        /* Delay animasi */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }
        .delay-5 { animation-delay: 1s; }

        /* Navbar styling */
        .navbar {
            background: white !important;
            transition: all 0.3s ease;
        }
        
        .navbar.scrolled {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            padding: 10px 0;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.7rem;
            letter-spacing: -0.5px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .navbar-brand:hover {
            transform: scale(1.02);
        }

        .brand-icon {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            padding: 6px 12px;
            border-radius: 14px;
            color: white;
            margin-right: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .navbar-brand:hover .brand-icon {
            transform: rotate(5deg) scale(1.05);
        }

        /* Navbar menu items */
        .nav-link {
            font-weight: 500;
            color: #1f2a3e;
            transition: all 0.3s ease;
            margin: 0 4px;
            border-radius: 8px;
            position: relative;
        }
        
        /* Efek underline pada nav-link */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #0d6efd;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        
        .nav-link:hover::after {
            width: 70%;
        }

        .nav-link:hover {
            background: #e9ecef;
            color: #0d6efd;
            transform: translateY(-2px);
        }

        .nav-link i {
            margin-right: 6px;
            transition: transform 0.3s ease;
        }
        
        .nav-link:hover i {
            transform: scale(1.1);
        }

        /* Dropdown styling */
        .dropdown-item {
            font-weight: 500;
            padding: 8px 20px;
            transition: all 0.2s ease;
        }
        
        .dropdown-item:hover {
            background: #e9ecef;
            color: #0d6efd;
            transform: translateX(5px);
        }

        .dropdown-item i {
            margin-right: 8px;
            width: 20px;
            transition: transform 0.2s ease;
        }
        
        .dropdown-item:hover i {
            transform: scale(1.1);
        }

        /* Language selector */
        .language-selector {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 15px;
            padding: 5px 10px;
            border-radius: 30px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .language-selector:hover {
            background: #e9ecef;
            transform: scale(1.02);
        }

        .lang-option {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .lang-option:hover {
            background: #dee2e6;
            transform: scale(1.05);
        }

        .lang-option.active {
            background: #0d6efd;
            color: white;
        }

        /* Logout button */
        .logout-btn {
            background: none;
            border: none;
            color: #dc3545;
        }

        .logout-btn:hover {
            background: #dc3545;
            color: white;
            transform: translateY(-2px);
        }

        /* Hero section */
        .hero-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1rem;
            background-image: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1600');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            border-radius: 24px;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        /* Overlay gelap */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 24px;
        }

        .hero-section .container {
            position: relative;
            z-index: 1;
        }

        .welcome-title {
            font-size: 3.4rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInLeft 0.8s ease 0.4s backwards;
        }

        /* Search container */
        .search-container {
            max-width: 680px;
            margin: 1.5rem auto 0 auto;
            animation: fadeInRight 0.8s ease 0.6s backwards;
        }

        .search-wrapper {
            display: flex;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border-radius: 60px;
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .search-wrapper:focus-within {
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
            transform: scale(1.01);
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 14px 20px;
            background: transparent;
        }

        .search-btn {
            background: #0d6efd;
            border: none;
            border-radius: 0;
            padding: 0 28px;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .search-btn:hover {
            background: #0b5ed7;
            transform: scale(1.02);
        }

        /* Card halaman */
        .page-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            margin: 1rem 0 2rem 0;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.8s forwards;
        }
        
        .page-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .contact-phone-card {
            background: #eef4ff;
            border-left: 5px solid #0d6efd;
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        
        .contact-phone-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .footer-mini {
            background: #eef2f5;
            padding: 1.2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #4a627a;
            margin-top: 2rem;
        }

        .login-status-badge {
            background: #19875420;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #198754;
            margin-left: 8px;
            transition: all 0.3s ease;
        }
        
        .login-status-badge:hover {
            transform: scale(1.05);
            background: #19875440;
        }

        /* Responsif */
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 2.3rem;
            }
            .hero-section {
                min-height: 70vh;
            }
            .search-btn span {
                display: none;
            }
            .search-btn {
                padding: 0 20px;
            }
            .language-selector {
                margin-left: 0;
                margin-top: 10px;
            }
        }

        .search-result-highlight {
            background: #fff3cd;
            padding: 12px;
            border-radius: 20px;
            margin-top: 16px;
            font-size: 0.9rem;
            animation: fadeInUp 0.4s ease forwards;
        }

        /* Profil page card khusus */
        .profile-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 32px;
            padding: 2rem;
            margin: 1rem 0;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }
        
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .profile-card h2, .profile-card h3 {
            color: white;
        }

        .profile-card hr {
            background-color: rgba(255,255,255,0.3);
        }
        
        /* Badge animasi */
        .badge {
            transition: all 0.3s ease;
        }
        
        .badge:hover {
            transform: scale(1.05);
        }
        
        /* Loading Screen (ditambahkan) */
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.8s ease-out 2s forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top: 6px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Efek ripple untuk tombol */
        .btn-ripple {
            position: relative;
            overflow: hidden;
        }
        
        .btn-ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-ripple:active::after {
            width: 300px;
            height: 300px;
        }
    </style>
</head>

        // Fungsi untuk mengupdate teks berdasarkan bahasa
        function updateLanguage() {
            const t = translations[currentLang];
            
            $("#institutionName").text(t.institutionName);
            $("#menuHome").text(t.menuHome);
            $("#menuProfile").text(t.menuProfile);
            $("#menuHistory").text(t.menuHistory);
            $("#menuVision").text(t.menuVision);
            $("#menuStructure").text(t.menuStructure);
            $("#menuCs").text(t.menuCs);
            $("#menuAbout").text(t.menuAbout);
            $("#logoutText").text(t.logoutText);
            
            if (!isLoggedIn) {
                $("#loginText").text(t.loginText);
            } else {
                $("#loginText").html(`<i class="bi bi-person-circle"></i> ${currentUser.username} <span class="login-status-badge">${t.loginLoggedIn}</span>`);
            }
            
            $("#footerEmail").text(t.footerEmail);
            $("#footerPhone").text(t.footerPhone);
            
            if (currentLang === "id") {
                $langId.addClass("active");
                $langEn.removeClass("active");
            } else {
                $langEn.addClass("active");
                $langId.removeClass("active");
            }
            
            localStorage.setItem("selectedLanguage", currentLang);
            
            let currentPage = $mainArea.data("currentPage") || "home";
            switch(currentPage) {
                case "home": renderHomePage(); break;
                case "login": renderLoginPage(); break;
                case "cs": renderCustomerService(); break;
                case "about": renderAboutPage(); break;
                case "sejarah": renderSejarahPage(); break;
                case "visimisi": renderVisiMisiPage(); break;
                case "struktur": renderStrukturPage(); break;
                default: renderHomePage();
            }
        }

                        </div>
                        <div class="search-container">

                                <input type="text" id="globalSearchInput" class="search-input" placeholder="${t.searchPlaceholder}">
                                <button id="globalSearchBtn" class="search-btn btn-ripple"><i class="bi bi-search"></i> <span>${t.searchBtn}</span></button>
                            </div>
                            <div id="searchResultInfo" class="mt-3 text-start"></div>
                        </div>
                        <div class="row mt-5 justify-content-center">
                            <div class="col-md-8">
                                <div class="page-card text-start">
                                    <h4><i class="bi bi-megaphone-fill text-primary animate-pulse"></i> ${t.announcementTitle}</h4>
                                    <p>${t.announcementText}</p>

                                        <span class="badge bg-light text-dark p-2"><i class="bi bi-star-fill text-warning"></i> ${t.rating}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            $mainArea.html(html);
            
            $("#globalSearchBtn").on("click", function() {
                let query = $("#globalSearchInput").val().trim();
                if (query === "") {
                    $("#searchResultInfo").html(`<div class="search-result-highlight"><i class="bi bi-exclamation-triangle-fill text-warning"></i> ${t.searchEmpty}</div>`);
                } else {
                    $("#searchResultInfo").html(`
                        <div class="search-result-highlight">
                            <i class="bi bi-search-heart-fill text-primary"></i> 
                            <strong>${t.searchResult} "${query}":</strong><br>
                            • ${t.searchResultText}<br>
                            • Dokumentasi dan artikel tersedia di menu <strong>Customer Service</strong>.
                        </div>
                    `);
                }
            });
            
            $("#globalSearchInput").on("keypress", function(e) {
                if (e.which === 13) $("#globalSearchBtn").click();
            });
            
            $mainArea.data("currentPage", "home");
        }

            $mainArea.html(html);
            $mainArea.data("currentPage", "login");
            
            $("#loginFormPage").on("submit", function(e) {
                e.preventDefault();
                let username = $("#loginUsernamePage").val().trim();
                let email = $("#loginEmailPage").val().trim();
                let password = $("#loginPasswordPage").val().trim();
                
                if (username === "admin" && email === "admin@lembaga.id" && password === "123456") {
                    isLoggedIn = true;
                    currentUser = { username: username, email: email };

                    renderHomePage();
                    alert(`${t.loginSuccess} ${username}, ${t.loginSuccessText}`);
                } else {

        function logoutUser() {
            const t = translations[currentLang];
            isLoggedIn = false;
            currentUser = { username: "", email: "" };
            sessionStorage.removeItem("lembagaLogged");
            updateUIBasedOnLogin();
            renderHomePage();
            alert(t.logoutSuccess);
        }
        
        function updateUIBasedOnLogin() {
            const t = translations[currentLang];
            if (isLoggedIn) {
                $loginNavItem.hide();
                $logoutNavItem.show();
                $("#loginText").html(`<i class="bi bi-person-circle"></i> ${currentUser.username} <span class="login-status-badge">${t.loginLoggedIn}</span>`);
                $navLogoutLink.off("click").on("click", function(e) {
                    e.preventDefault();
                    logoutUser();
                });
            } else {
                $loginNavItem.show();
                $logoutNavItem.hide();
                $("#loginText").html(`<i class="bi bi-box-arrow-in-right"></i> ${t.loginText}`);
                $navLoginLink.off("click").on("click", function(e) {
                    e.preventDefault();
                    renderLoginPage();
                });
            }
        }

            renderHomePage();
        });
        
        $navCsLink.on("click", function(e) {

            $('.dropdown-toggle').dropdown('hide');

            e.preventDefault();
            renderVisiMisiPage();
            $('.dropdown-toggle').dropdown('hide');
        });
        
        $strukturLink.on("click", function(e) {
            e.preventDefault();
            renderStrukturPage();
            $('.dropdown-toggle').dropdown('hide');
        });
        
        $langId.on("click", function() {
            currentLang = "id";
            updateLanguage();
            updateUIBasedOnLogin();
        });
        
        $langEn.on("click", function() {
            currentLang = "en";
            updateLanguage();
            updateUIBasedOnLogin();
        });
        
        let savedSession = sessionStorage.getItem("lembagaLogged");
        if (savedSession) {
            try {
                let sess = JSON.parse(savedSession);
                if (sess.isLoggedIn) {
                    isLoggedIn = true;
                    currentUser = { username: sess.username, email: sess.email };
                }
            } catch (e) {}
        }
        
        updateLanguage();
        updateUIBasedOnLogin();
        renderHomePage();
